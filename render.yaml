services:
  - type: web
    name: mm-setpieces-analytics
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.headless true --server.address 0.0.0.0 --server.enableCORS false
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
